<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Social Followers — drop-in component</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  body{margin:0;font-family:"Montserrat",system-ui,sans-serif;background:#f4f4f7;padding:40px 16px}
  .demo{max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:24px}
  .demo h4{margin:0 0 4px;font-size:13px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.06em}
  .panel{padding:22px;border-radius:18px}
  .on-dark{background:linear-gradient(120deg,#1E1B3A,#2E1065)}
  .on-light{background:#fff;border:1px solid #ECECF2}

  /* ===== THE COMPONENT ===== */
  .followers{display:flex;flex-wrap:wrap;gap:9px}
  .fol{display:inline-flex;align-items:center;gap:8px;background:#fff;border-radius:30px;padding:5px 14px 5px 5px;box-shadow:0 4px 14px -6px rgba(20,20,43,.35)}
  .fol-ic{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;color:#fff;flex-shrink:0}
  .fol-ic svg{width:15px;height:15px}
  .fol b{font-size:14px;font-weight:800;color:#14142B;letter-spacing:-.01em;line-height:1}
  /* brand colours */
  .ig{background:linear-gradient(135deg,#F58529,#DD2A7B 55%,#8134AF)}
  .fb{background:#1877F2}
  .yt{background:#FF0000}
  .tw{background:#000}
  .wa{background:#25D366}
  .tk{background:#000}
  .ln{background:#0A66C2}
  /* ========================= */
</style>
</head>
<body>
<div class="demo">
  <div>
    <h4>On your dark band</h4>
    <div class="panel on-dark"><div class="followers" id="f1"></div></div>
  </div>
  <div>
    <h4>On white</h4>
    <div class="panel on-light"><div class="followers" id="f2"></div></div>
  </div>
</div>

<script>
/* 1) brand icon library (accurate SVG paths) */
const ICONS = {
  instagram:'<path d="M12 7.3a4.7 4.7 0 1 0 0 9.4 4.7 4.7 0 0 0 0-9.4zm0 7.7a3 3 0 1 1 0-6 3 3 0 0 1 0 6zM17.5 6a1.1 1.1 0 1 0 0 2.2 1.1 1.1 0 0 0 0-2.2zM12 4.2c2.5 0 2.8 0 3.8.05 2.5.1 3.7 1.3 3.8 3.8.05 1 .05 1.3.05 3.8s0 2.8-.05 3.8c-.1 2.5-1.3 3.7-3.8 3.8-1 .05-1.3.05-3.8.05s-2.8 0-3.8-.05c-2.5-.1-3.7-1.3-3.8-3.8C4.3 14.8 4.3 14.5 4.3 12s0-2.8.05-3.8c.1-2.5 1.3-3.7 3.8-3.8 1-.05 1.3-.05 3.8-.05z" fill="#fff"/>',
  facebook:'<path d="M13.5 21v-7h2.3l.4-2.8h-2.7V9.4c0-.8.2-1.3 1.4-1.3h1.4V5.6c-.3 0-1.1-.1-2-.1-2 0-3.4 1.2-3.4 3.5v1.9H8.5V14h2.4v7h2.6z" fill="#fff"/>',
  youtube:'<path d="M21.6 8.2c-.2-.9-.8-1.5-1.7-1.7C18.3 6 12 6 12 6s-6.3 0-7.9.5c-.9.2-1.5.8-1.7 1.7C2 9.8 2 12 2 12s0 2.2.4 3.8c.2.9.8 1.5 1.7 1.7 1.6.5 7.9.5 7.9.5s6.3 0 7.9-.5c.9-.2 1.5-.8 1.7-1.7.4-1.6.4-3.8.4-3.8s0-2.2-.4-3.8zM10 15V9l5.2 3-5.2 3z" fill="#fff"/>',
  twitter:'<path d="M17.5 5h2.4l-5.2 6 6.2 8h-4.9l-3.8-5-4.4 5H5.4l5.6-6.4L4.7 5h5l3.5 4.6L17.5 5z" fill="#fff"/>',
  whatsapp:'<path d="M12 4a8 8 0 0 0-6.9 12l-1 3.7 3.8-1A8 8 0 1 0 12 4zm4.3 11.2c-.2.5-1 .9-1.4 1-.4 0-.8.2-2.6-.5-2.2-.9-3.6-3.1-3.7-3.2-.1-.1-.9-1.2-.9-2.3s.6-1.6.8-1.8c.2-.2.4-.3.6-.3h.4c.1 0 .3 0 .5.4l.7 1.7c.1.1.1.3 0 .4l-.3.4-.3.3c-.1.1-.2.2-.1.4.1.2.6 1 1.3 1.6.9.8 1.6 1 1.8 1.1.2.1.3.1.4-.1l.6-.7c.2-.2.3-.2.5-.1l1.6.8c.2.1.4.2.4.3.1.1.1.5-.1 1z" fill="#fff"/>'
};
/* short class keys for brand background colour */
const CLS = {instagram:'ig', facebook:'fb', youtube:'yt', twitter:'tw', whatsapp:'wa'};

/* 2) your data — counts keyed by platform */
const followers = { instagram:'48.2K', facebook:'31.5K', youtube:'22.7K', twitter:'9.4K' };

/* 3) render: icon + count, in platform order, skipping any with no value */
function renderFollowers(targetId, data){
  const order = ['instagram','facebook','youtube','twitter','whatsapp'];
  document.getElementById(targetId).innerHTML = order
    .filter(p => data[p])
    .map(p => `
      <div class="fol">
        <span class="fol-ic ${CLS[p]}"><svg viewBox="0 0 24 24">${ICONS[p]}</svg></span>
        <b>${data[p]}</b>
      </div>`).join('');
}
renderFollowers('f1', followers);
renderFollowers('f2', followers);
</script>
</body>
</html>
